<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src http://localhost:3001; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>Open Claude Cowork</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236c63ff'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'>C</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>Cowork</h1>
        <button id="new-chat-btn" title="New chat">+</button>
      </div>
      <div id="chat-list"></div>
      <div class="sidebar-footer">
        <select id="model-select">
          <option value="claude-sonnet-4-6-20250620">Sonnet 4.6</option>
          <option value="claude-opus-4-6-20250620">Opus 4.6</option>
          <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
        </select>
      </div>
    </aside>

    <!-- Main chat area -->
    <main id="chat-area">
      <div id="messages"></div>
      <div id="input-bar">
        <textarea id="message-input" placeholder="Type a message..." rows="1"></textarea>
        <button id="send-btn" title="Send">Send</button>
        <button id="stop-btn" title="Stop" class="hidden">Stop</button>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
