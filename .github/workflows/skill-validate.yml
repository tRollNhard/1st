name: Validate Skills

on:
  pull_request:
    paths:
      - 'custom-skills/**'
      - 'scripts/validate-skills.py'
      - 'scripts/test_validate_skills.py'
      - 'scripts/test_skill_crawler.py'
      - 'scripts/conftest.py'
      - 'skill_crawler.py'
      - 'requirements.txt'
      - '.coveragerc'
      - '.github/workflows/skill-validate.yml'
  push:
    branches: [main]
    paths:
      - 'custom-skills/**'
      - 'scripts/validate-skills.py'
      - 'scripts/test_validate_skills.py'
      - 'scripts/test_skill_crawler.py'
      - 'scripts/conftest.py'
      - 'skill_crawler.py'
      - 'requirements.txt'
      - '.coveragerc'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt pytest pytest-cov

      - name: Run unit tests with coverage
        run: |
          python -m pytest \
            scripts/test_validate_skills.py \
            scripts/test_skill_crawler.py \
            --cov --cov-report=term-missing -v

      - name: Validate SKILL.md frontmatter
        run: python scripts/validate-skills.py custom-skills
