<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Motivation — Daily Quote</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .quote-card-preview {
      width: 100%;
      aspect-ratio: 9/16;
      max-height: 240px;
      background: #13131f;
      border: 1px solid #1e1e30;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .quote-card-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
      opacity: 0.9;
    }
    .quote-block {
      width: 100%;
      background: #13131f;
      border: 1px solid #1e1e30;
      border-radius: 12px;
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .quote-text-display {
      font-size: 17px;
      font-style: italic;
      color: #e8e8f0;
      line-height: 1.65;
      text-align: center;
    }
    .quote-author-display {
      font-size: 13px;
      color: #7c6dfa;
      text-align: center;
      font-weight: 600;
    }
    .quote-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #333;
      margin-bottom: 4px;
    }
    .time-badge {
      background: #13131f;
      border: 1px solid #7c6dfa22;
      color: #555;
      padding: 4px 14px;
      border-radius: 100px;
      font-size: 11px;
    }
  </style>
</head>
<body>

  <div class="container" id="loadingView">
    <div class="logo">⚡ MOTIVATION</div>
    <div class="loading-ring"></div>
    <p class="loading-text">Finding today's quote...</p>
  </div>

  <div class="container hidden" id="promptView">
    <div class="logo">⚡ MOTIVATION</div>
    <div class="time-badge">7:15 AM • Daily Quote Post</div>

    <div class="quote-block">
      <div class="quote-label">TODAY'S QUOTE</div>
      <div class="quote-text-display" id="quoteText"></div>
      <div class="quote-author-display" id="quoteAuthor"></div>
    </div>

    <div class="meta-row">
      <span class="meta-pill">🎨 Cinematic Card</span>
      <span class="meta-pill">📱 4 Platforms</span>
      <span class="meta-pill" style="color:#4ade80;border-color:#4ade8022">$0</span>
    </div>

    <div class="btn-row">
      <button class="btn btn-skip" id="btnSkip">Skip</button>
      <button class="btn btn-edit" id="btnEdit">Edit Quote</button>
      <button class="btn btn-approve" id="btnApprove">▶ Generate & Post</button>
    </div>

    <div class="edit-area hidden" id="editArea">
      <textarea id="editText" rows="3" placeholder="Quote text..."></textarea>
      <textarea id="editAuthor" rows="1" placeholder="Author (optional)..." style="margin-top:6px"></textarea>
      <button class="btn btn-save" id="btnSave">Save</button>
    </div>
  </div>

  <div class="container hidden" id="errorView">
    <div class="logo">⚡ MOTIVATION</div>
    <div class="error-msg" id="errorMsg"></div>
    <button class="btn btn-edit" onclick="location.reload()">Retry</button>
  </div>

  <script src="quote.js"></script>
</body>
</html>
